# Archiver paths — set via environment variables in production / Docker
#archiver.root=${ARCHIVER_ROOT}
#archiver.inbox=${ARCHIVER_INBOX:}

# Anthropic
anthropic.api-key=${ANTHROPIC_API_KEY}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.profiles.default=local,user

# jte
gg.jte.developmentMode=true
gg.jte.templateLocation=src/main/jte

# Logging
logging.level.com.github.lafarer.archiver=INFO
