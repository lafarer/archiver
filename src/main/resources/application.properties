# Archiver paths — set via environment variables in production / Docker
archiver.root=${ARCHIVER_ROOT}
archiver.inbox=${ARCHIVER_INBOX:}

# Anthropic
anthropic.api-key=${ANTHROPIC_API_KEY}

# Server
server.address=${ARCHIVER_HOST:127.0.0.1}
server.port=${ARCHIVER_PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.sqlite.JDBC

# jte
gg.jte.developmentMode=true

# Logging
logging.level.com.github.lafarer.archiver=INFO
