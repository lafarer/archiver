# Archiver paths - set via environment variables in production / Docker
#archiver.root=${ARCHIVER_ROOT}
#archiver.inbox-folder=Inbox
#archiver.archive-folder=Archive

# Anthropic
archiver.anthropic.api-key=

# Multipart upload limits
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.sqlite.JDBC
# Store Instant as epoch millis (BIGINT) - SQLite JDBC cannot parse timestamp strings
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=BIGINT
spring.profiles.default=local,user

# jte
gg.jte.developmentMode=true
gg.jte.templateLocation=src/main/jte

# Logging
logging.level.com.github.lafarer.archiver=INFO
logging.level.com.github.lafarer.archiver.service.impl.AnthropicAiAnalysisService=DEBUG
